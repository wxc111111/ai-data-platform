server:
  port: 7071

spring:
  application:
    name: ai-data-server
  profiles:
    active: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/ai_data_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 3s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: mysql
  reasonable: false
  support-methods-arguments: false

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 7200
  active-timeout: 1800
  is-concurrent: true
  is-share: false
  token-style: uuid

ai-data:
  file:
    root-path: /data/ai-data-platform
  agent:
    model: ${DASHSCOPE_MODEL:dashscope:qwen-plus}
    state-path: ${AGENTSCOPE_STATE_PATH:.agentscope/state/ai-data-agent}
    system-prompt: ${AGENT_SYSTEM_PROMPT:你是 AI 数据服务中台的问答助手。需要查询业务数据时，只能调用已授权的 Skill；回答要简洁、准确。}

management:
  endpoints:
    web:
      exposure:
        include: health,info
